version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medinexus_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-medinexus}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - medinexus-net

  # Redis Cache for Sessions/Queues
  redis:
    image: redis:7-alpine
    container_name: medinexus_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - medinexus-net

  # Backend API (Node.js/NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medinexus_api
    restart: on-failure
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-medinexus}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_do_not_use_in_prod}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-00000000000000000000000000000000} # 32-byte hex for dev
      API_KEY: ${API_KEY} # Google Gemini API Key
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - medinexus-net

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medinexus_web
    restart: on-failure
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - medinexus-net

volumes:
  postgres_data:

networks:
  medinexus-net:
    driver: bridge
